services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    expose:
      - "5000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    restart: unless-stopped
    # Mirrors the Dockerfile HEALTHCHECK so health is visible in `docker ps` and tunable
    # without rebuilding the image. Targets the dependency-free liveness endpoint.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  certbot-etc:
  certbot-www:
